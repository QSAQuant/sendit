<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" width="480" height="270" role="img" aria-label="SENDIT peel clip">
  <rect width="480" height="270" fill="#0b0b0c"/>
  <text x="24" y="40" fill="#f4f0e6" font-family="Arial Black, sans-serif" font-size="28">SENDIT</text>
  <text x="24" y="64" fill="#ff5a1f" font-family="monospace" font-size="14">DON'T PAPER.</text>
  <path id="wire" d="M40 220 C140 200, 220 140, 320 90 S420 40, 440 30" fill="none" stroke="#2a2a2e" stroke-width="6" stroke-linecap="round"/>
  <path d="M40 220 C140 200, 220 140, 320 90 S400 48, 410 42" fill="none" stroke="#ff5a1f" stroke-width="5" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" values="0 600;420 600;420 600;0 600" dur="3s" repeatCount="indefinite"/>
  </path>
  <circle r="10" fill="#ffb020">
    <animateMotion dur="3s" repeatCount="indefinite" path="M40 220 C140 200, 220 140, 320 90 S400 48, 410 42"/>
    <animate attributeName="fill" values="#ffb020;#ff5a1f;#ff2d55;#ffb020" dur="3s" repeatCount="indefinite"/>
  </circle>
  <g>
    <rect x="300" y="150" width="150" height="44" rx="8" fill="#141416" stroke="#ff5a1f" stroke-width="2">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.35;0.45;0.7;1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="318" y="178" fill="#ff5a1f" font-family="Arial Black, sans-serif" font-size="20">
      PEEL 50%
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.35;0.45;0.7;1" dur="3s" repeatCount="indefinite"/>
    </text>
  </g>
  <circle cx="410" cy="42" r="0" fill="#ff2d55" opacity="0.85">
    <animate attributeName="r" values="0;0;0;36;0" keyTimes="0;0.7;0.78;0.88;1" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0;0.9;0" keyTimes="0;0.7;0.78;0.88;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="24" y="250" fill="#9a9590" font-family="monospace" font-size="12">SEND ’ PEEL ’ CASH</text>
</svg>
